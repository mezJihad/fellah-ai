<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1aab5a"/>
      <stop offset="100%" style="stop-color:#0f6b34"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="90" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow ring -->
  <rect x="12" y="12" width="476" height="476" rx="80"
    fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.12"/>

  <!-- Mountain peaks — M shape (Mgoun Atlas) -->
  <polyline
    points="62,368 182,108 252,232 322,108 438,368"
    fill="none"
    stroke="white"
    stroke-width="44"
    stroke-linejoin="round"
    stroke-linecap="round"
    filter="url(#shadow)"
  />

  <!-- Snow cap left peak -->
  <polyline
    points="155,160 182,108 209,160"
    fill="none"
    stroke="#d1fae5"
    stroke-width="10"
    stroke-linejoin="round"
    stroke-linecap="round"
    opacity="0.7"
  />

  <!-- Snow cap right peak -->
  <polyline
    points="295,160 322,108 349,160"
    fill="none"
    stroke="#d1fae5"
    stroke-width="10"
    stroke-linejoin="round"
    stroke-linecap="round"
    opacity="0.7"
  />

  <!-- AI sparkle dot — top right of right peak -->
  <circle cx="338" cy="96" r="11" fill="#fbbf24"/>
  <circle cx="338" cy="96" r="6"  fill="#ffffff"/>

  <!-- "Mgoun" text -->
  <text x="250" y="432"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="900"
    fill="url(#textGrad)"
    text-anchor="middle"
    letter-spacing="6">
    MGOUN
  </text>

  <!-- "AI" badge — smaller, gold -->
  <text x="250" y="475"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="700"
    fill="#fbbf24"
    text-anchor="middle"
    letter-spacing="10">
    A I
  </text>
</svg>
